        class Usuario {
  #email;
  #senha;

  constructor(email, senha) {
    this.#email = email;
    this.#senha = senha;
  }

  get email() {
    return this.#email;
  }

  verificarSenha  (palpite) {
    return palpite === this.#senha;
  }
}

const usuario = new Usuario("usuario@email.com", "Novasenha");

console.log(usuario.email);

console.log(usuario.verificarSenha("Novasenha"));
